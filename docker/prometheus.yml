global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    service: lunex-dex

# ── Alert Rules ────────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/alert-rules.yml

# ── Alertmanager ──────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
      timeout: 10s

# ── Scrape Targets ────────────────────────────────────────────────────────────
scrape_configs:
  # Lunex API (Express + prom-client)
  - job_name: lunex_api
    static_configs:
      - targets: ["api:4000"]
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Node Exporter (host system metrics — runs on host:9100)
  - job_name: node_exporter
    static_configs:
      - targets: ["host.docker.internal:9100"]
    scrape_interval: 30s

  # Postgres Exporter
  - job_name: postgres_exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]
    scrape_interval: 30s

  # Redis Exporter
  - job_name: redis_exporter
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 30s

  # Nginx (via nginx-prometheus-exporter scraping stub_status on nginx:8888)
  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]
    scrape_interval: 30s

  # SSL/TLS certificate expiry (blackbox exporter probes endpoints over TLS).
  # The SSLCertificateExpiringSoon alert in alert-rules.yml depends on the
  # `probe_ssl_earliest_cert_expiry` metric produced by this scrape.
  - job_name: ssl_expiry
    metrics_path: /probe
    params:
      module: [tcp_connect_tls]
    static_configs:
      - targets:
          - lunex.lunes.io:443
          - lunex-sandbox.lunes.io:443
    scrape_interval: 5m
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # HTTP probes (uptime + response time) — same exporter, different module.
  - job_name: http_probe
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://lunex.lunes.io
          - https://lunex.lunes.io/api/v1/pairs
    scrape_interval: 60s
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
