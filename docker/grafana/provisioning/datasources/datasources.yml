apiVersion: 1

datasources:
  # ── Prometheus ────────────────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: POST
    editable: false

  # ── Loki (Logs) ───────────────────────────────────────────────────────────
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    jsonData:
      maxLines: 1000
      derivedFields:
        # Link log lines that contain traceId to traces (if Tempo added later)
        - matcherRegex: '"traceId":"(\w+)"'
          name: TraceID
          url: ''
    editable: false
