# =============================================================================
# Lunex DEX — Testnet Stack (Public Lunes Testnet)
# Domain: lunex-sandbox.lunes.io
#
# Connects to the PUBLIC Lunes Testnet — no local blockchain node needed.
# Use this for external testing and developer onboarding.
#
# Usage:
#   docker compose -f docker/docker-compose.testnet.yml \
#     --env-file docker/.env.testnet up -d
#
# Environment file: docker/.env.testnet (copy from .env.testnet.example)
# =============================================================================

services:

  # ── PostgreSQL (testnet isolated DB) ──
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "max_connections=50"
    environment:
      POSTGRES_DB: lunex_testnet
      POSTGRES_USER: ${DB_USER:-lunex}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env.testnet}
    volumes:
      - testnet-pgdata:/var/lib/postgresql/data
    networks:
      - testnet_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lunex}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    networks:
      - testnet_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - testnet-redisdata:/data

  # ── Spot API (testnet) ──
  api:
    build:
      context: ../spot-api
      dockerfile: ../docker/Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-lunex}:${DB_PASSWORD}@postgres:5432/lunex_testnet?schema=public
      PORT: 4000
      WS_PORT: 4001
      # Connects to PUBLIC Lunes Testnet — no local node needed
      LUNES_WS_URL: ${LUNES_TESTNET_WS_URL:-wss://testnet.lunes.io}
      RELAYER_SEED: ${RELAYER_SEED:?Set RELAYER_SEED in .env.testnet}
      REDIS_URL: redis://redis:6379
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://lunex-sandbox.lunes.io}
      TRUST_PROXY: "true"
      SOCIAL_ANALYTICS_ENABLED: "true"
      SUBQUERY_ENDPOINT: "http://subquery-query:3000"
      SUBQUERY_ENABLED: "true"
      # Testnet contract addresses
      SPOT_CONTRACT_ADDRESS: ${TESTNET_SPOT_CONTRACT:-}
      SPOT_CONTRACT_METADATA_PATH: ${TESTNET_SPOT_CONTRACT_METADATA_PATH:-./abis/Spot.json}
      FACTORY_CONTRACT_ADDRESS: ${TESTNET_FACTORY_CONTRACT:-}
      FACTORY_CONTRACT_METADATA_PATH: ${FACTORY_CONTRACT_METADATA_PATH:-./abis/Factory.json}
      NATIVE_TOKEN_ADDRESS: ${TESTNET_NATIVE_TOKEN_ADDRESS:-}
      ROUTER_CONTRACT_ADDRESS: ${TESTNET_ROUTER_CONTRACT:-}
      STAKING_CONTRACT_ADDRESS: ${TESTNET_STAKING_CONTRACT:-}
      LISTING_MANAGER_CONTRACT_ADDRESS: ${TESTNET_LISTING_MANAGER_CONTRACT:-}
    networks:
      - testnet_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Frontend DEX (testnet build) ──
  frontend:
    build:
      context: ../lunes-dex-main
      dockerfile: ../docker/Dockerfile.frontend
      args:
        REACT_APP_NETWORK: testnet
        REACT_APP_SPOT_API_URL: ""
        REACT_APP_RPC_MAINNET: ${LUNES_TESTNET_WS_URL:-wss://testnet.lunes.io}
        REACT_APP_FACTORY_CONTRACT: ${TESTNET_FACTORY_CONTRACT:-}
        REACT_APP_ROUTER_CONTRACT: ${TESTNET_ROUTER_CONTRACT:-}
        REACT_APP_STAKING_CONTRACT: ${TESTNET_STAKING_CONTRACT:-}
        REACT_APP_REWARDS_CONTRACT: ${TESTNET_REWARDS_CONTRACT:-}
        REACT_APP_TOKEN_WLUNES: ${TESTNET_WLUNES_ADDRESS:-}
        REACT_APP_TOKEN_LUSDT: ${TESTNET_LUSDT_ADDRESS:-}
        REACT_APP_TOKEN_LBTC: ${TESTNET_LBTC_ADDRESS:-}
        REACT_APP_TOKEN_LETH: ${TESTNET_LETH_ADDRESS:-}
        REACT_APP_TOKEN_GMC: ${TESTNET_GMC_ADDRESS:-}
        REACT_APP_TOKEN_LUP: ${TESTNET_LUP_ADDRESS:-}
        REACT_APP_ENABLE_STAKING: "true"
        REACT_APP_ENABLE_REWARDS: "true"
        REACT_APP_DEV_MODE: "false"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - testnet_internal

  # ── Admin Panel (testnet) ──
  admin:
    build:
      context: ../lunex-admin
      dockerfile: ../docker/Dockerfile.admin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-lunex}:${DB_PASSWORD}@postgres:5432/lunex_testnet?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://lunex-sandbox.lunes.io/admin}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET in .env.testnet}
      NEXT_PUBLIC_API_URL: http://api:4000
      PORT: "3001"
    networks:
      - testnet_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── SubQuery Node (indexes Lunes Testnet events) ──
  subquery-node:
    image: subquerynetwork/subql-node-substrate:v6.4.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_USER: ${DB_USER:-lunex}
      DB_PASS: ${DB_PASSWORD}
      DB_DATABASE: lunex_testnet
      DB_HOST: postgres
      DB_PORT: "5432"
    volumes:
      - ../subquery-node:/app
    command:
      - -f=/app
      - --db-schema=subquery
      - --workers=1
      - --batch-size=30
      - --unfinalized-blocks=true
    networks:
      - testnet_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ── SubQuery Query (GraphQL) ──
  subquery-query:
    image: subquerynetwork/subql-query:v2.13.1
    restart: unless-stopped
    depends_on:
      subquery-node:
        condition: service_healthy
    environment:
      DB_USER: ${DB_USER:-lunex}
      DB_PASS: ${DB_PASSWORD}
      DB_DATABASE: lunex_testnet
      DB_HOST: postgres
      DB_PORT: "5432"
      PORT: "3000"
    command:
      - --name=lunex-subquery
      - --playground
      - --indexer=http://subquery-node:3000
    networks:
      - testnet_internal

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      - api
      - frontend
      - admin
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.testnet.conf:/etc/nginx/conf.d/default.conf
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    networks:
      - testnet_public
      - testnet_internal
    command: '/bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g ''daemon off;''"'

  # ── Certbot ──
  certbot:
    image: certbot/certbot
    depends_on:
      - nginx
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    networks:
      - testnet_public
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  testnet_public:
    driver: bridge
  testnet_internal:
    driver: bridge
    internal: true

volumes:
  testnet-pgdata:
  testnet-redisdata:
  certbot-etc:
  certbot-var:
