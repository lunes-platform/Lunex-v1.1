# =============================================================================
# Lunex DEX — Nginx Testnet Config
# Domain: lunex-sandbox.lunes.io
# Connects to PUBLIC Lunes Testnet
# =============================================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_global:10m   rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_orders:1m    rate=10r/s;
limit_req_zone $binary_remote_addr zone=rpc_limit:10m    rate=30r/s;
limit_req_zone $binary_remote_addr zone=frontend:10m     rate=200r/m;

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen 80;
    server_name lunex-sandbox.lunes.io;
    return 301 https://$host$request_uri;
}

# ── HTTPS — lunex-sandbox.lunes.io (Testnet DEX) ──────────────────────────
server {
    listen 443 ssl http2;
    server_name lunex-sandbox.lunes.io;

    ssl_certificate     /etc/letsencrypt/live/lunex.lunes.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lunex.lunes.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL_sandbox:10m;
    ssl_session_timeout 1d;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Environment "testnet" always;

    # ── REST API ──
    location /api/ {
        limit_req zone=api_global burst=30 nodelay;
        proxy_pass         http://api:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Orders (stricter rate limit) ──
    location /api/v1/orders {
        limit_req zone=api_orders burst=5 nodelay;
        proxy_pass         http://api:4000/api/v1/orders;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WebSocket ──
    location /ws {
        proxy_pass         http://api:4001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── SubQuery GraphQL ──
    location /graphql {
        proxy_pass         http://subquery-query:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Admin Panel ──
    location /admin {
        proxy_pass         http://admin:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Health check ──
    location /health {
        proxy_pass http://api:4000/health;
    }

    # ── Metrics (internal access only) ──
    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        deny all;
        proxy_pass http://api:4000/metrics;
    }

    # ── Frontend (SPA catch-all) ──
    location / {
        limit_req zone=frontend burst=50 nodelay;
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_intercept_errors on;
        error_page 404 = @frontend_fallback;
    }

    location @frontend_fallback {
        proxy_pass http://frontend:80;
    }
}
