# ─────────────────────────────────────────────────────────────────────────────
#  Lunex DEX — Docker Compose com Doppler (VPS produção)
#
#  Pré-requisito na VPS:
#    export DOPPLER_TOKEN=dp.st.prod.xxxx
#
#  Subir:
#    DOPPLER_TOKEN=dp.st.prod.xxxx doppler run -- \
#      docker compose -f docker/docker-compose.doppler.yml up -d
#
#  O Doppler injeta todas as variáveis de ambiente antes do compose iniciar.
#  O compose repassa apenas as vars necessárias para cada container.
#  Nenhum arquivo .env toca o disco da VPS.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lunex_spot
      POSTGRES_USER: ${DB_USER:-lunex}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Defina DB_PASSWORD no Doppler}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Porta não exposta externamente — apenas na rede interna Docker
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lunex} -d lunex_spot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?Defina REDIS_PASSWORD no Doppler}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Spot API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: ../spot-api
      dockerfile: ../docker/Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Doppler já injetou essas vars no processo do compose — apenas repassamos
      NODE_ENV: production
      PORT: "4000"
      WS_PORT: "4001"
      TRUST_PROXY: "true"
      DATABASE_URL: postgresql://${DB_USER:-lunex}:${DB_PASSWORD}@postgres:5432/lunex_spot?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # Secrets sensíveis — vêm do Doppler, nunca escritos em arquivo
      RELAYER_SEED: ${RELAYER_SEED}
      ADMIN_SECRET: ${ADMIN_SECRET}
      LUNES_WS_URL: ${LUNES_WS_URL}
      FACTORY_CONTRACT_ADDRESS: ${FACTORY_CONTRACT_ADDRESS}
      SPOT_CONTRACT_ADDRESS: ${SPOT_CONTRACT_ADDRESS:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      # Só expõe para loopback — nginx faz o proxy público
      - "127.0.0.1:4000:4000"
      - "127.0.0.1:4001:4001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Frontend DEX ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../lunes-dex-main
      dockerfile: ../docker/Dockerfile.frontend
      args:
        REACT_APP_NETWORK: mainnet
        REACT_APP_SPOT_API_URL: ""
        REACT_APP_RPC_MAINNET: ${REACT_APP_RPC_MAINNET}
        REACT_APP_FACTORY_CONTRACT: ${FACTORY_CONTRACT_ADDRESS}
        REACT_APP_ROUTER_CONTRACT: ${ROUTER_CONTRACT_ADDRESS:-}
        REACT_APP_STAKING_CONTRACT: ${STAKING_CONTRACT_ADDRESS:-}
        REACT_APP_REWARDS_CONTRACT: ${REWARDS_CONTRACT_ADDRESS:-}
        REACT_APP_TOKEN_WLUNES: ${WLUNES_ADDRESS:-}
        REACT_APP_TOKEN_LUSDT: ${LUSDT_ADDRESS:-}
        REACT_APP_TOKEN_LBTC: ${LBTC_ADDRESS:-}
        REACT_APP_TOKEN_LETH: ${LETH_ADDRESS:-}
        REACT_APP_TOKEN_GMC: ${GMC_ADDRESS:-}
        REACT_APP_TOKEN_LUP: ${LUP_ADDRESS:-}
        REACT_APP_ENABLE_STAKING: "true"
        REACT_APP_ENABLE_REWARDS: "true"
        REACT_APP_DEV_MODE: "false"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"

  # ── Admin Panel ───────────────────────────────────────────────────────────
  admin:
    build:
      context: ../lunex-admin
      dockerfile: ../docker/Dockerfile.admin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-lunex}:${DB_PASSWORD}@postgres:5432/lunex_spot?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Defina NEXTAUTH_SECRET no Doppler}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://admin.lunex.io}
    ports:
      - "127.0.0.1:3001:3001"

  # ── nginx (reverse proxy público) ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
      - frontend
      - admin
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"

volumes:
  pgdata:
  redisdata:
