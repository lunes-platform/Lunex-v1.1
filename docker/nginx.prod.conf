# =============================================================================
# Lunex DEX — Nginx Production Configuration (Multi-Environment)
# Domains: lunex.lunes.io (prod), lunex-sandbox.lunes.io (sandbox), sandbox.lunes.io (testnet RPC)
# Security-hardened with rate limiting, DDoS mitigation, and security headers
# =============================================================================

# ── Rate Limiting Zones ───────────────────────────────────────────────────────
# 10 MB = ~160,000 IP states
limit_req_zone $binary_remote_addr zone=api_global:10m   rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_orders:10m   rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m     rate=5r/m;
limit_req_zone $binary_remote_addr zone=frontend:10m     rate=200r/m;
limit_req_zone $binary_remote_addr zone=rpc_limit:10m    rate=30r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── Upstream Definitions (PRODUCTION) ─────────────────────────────────────────
upstream api_backend {
    server api:4000;
    keepalive 32;
}

upstream ws_backend {
    server api:4001;
}

upstream frontend_backend {
    server frontend:80;
    keepalive 16;
}

upstream admin_backend {
    server admin:3001;
    keepalive 8;
}

# ── Upstream Definitions (SANDBOX) ────────────────────────────────────────────
upstream sandbox_api_backend {
    server sandbox-api:4010;
    keepalive 16;
}

upstream sandbox_ws_backend {
    server sandbox-api:4011;
}

upstream sandbox_frontend_backend {
    server sandbox-frontend:80;
    keepalive 8;
}

# ── Upstream Definitions (TESTNET NODE) ───────────────────────────────────────
upstream testnet_rpc {
    server lunes-testnet-node:9944;
}

upstream faucet_backend {
    server faucet:3333;
}

# =============================================================================
# 1. PRODUCTION — lunex.lunes.io
# =============================================================================

# HTTP → HTTPS Redirect
server {
    listen 80;
    server_name lunex.lunes.io;

    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS (Production)
server {
    listen 443 ssl http2;
    server_name lunex.lunes.io;

    # ── SSL/TLS ───────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/lunex.lunes.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lunex.lunes.io/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/lunex.lunes.io/chain.pem;
    resolver 1.1.1.1 8.8.8.8 valid=60s;
    resolver_timeout 2s;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options              "SAMEORIGIN" always;
    add_header X-Content-Type-Options       "nosniff" always;
    add_header X-XSS-Protection            "1; mode=block" always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy      "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss://lunex.lunes.io wss://ws.lunes.io https://lunex.lunes.io; frame-ancestors 'none';" always;

    # ── DDoS Mitigation ───────────────────────────────────────────────────────
    limit_conn conn_limit 20;

    client_body_timeout   10s;
    client_header_timeout 10s;
    keepalive_timeout     30s;
    send_timeout          10s;

    client_max_body_size    1m;
    client_body_buffer_size 16k;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml text/javascript application/wasm;

    # ── API Routes ────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_global burst=30 nodelay;
        limit_req_status 429;

        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;

        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # Stricter rate limit for order submission
    location /api/v1/orders {
        limit_req zone=api_orders burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    # Stricter rate limit for auth endpoints
    location ~ ^/api/v1/(auth|user) {
        limit_req zone=api_auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WebSocket (Orderbook feed) ────────────────────────────────────────────
    location /ws {
        limit_conn conn_limit 5;

        proxy_pass         http://ws_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Health check (no rate limit) ──────────────────────────────────────────
    location = /health {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # ── Metrics (internal only) ───────────────────────────────────────────────
    location = /metrics {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        deny all;
    }

    # ── Grafana (monitoring dashboard, internal) ──────────────────────────────
    location /grafana/ {
        proxy_pass http://grafana:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
    }

    # ── Admin Panel ───────────────────────────────────────────────────────────
    location /admin/ {
        limit_req zone=frontend burst=20 nodelay;

        proxy_pass         http://admin_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Frontend DEX (SPA — catch-all, must be last) ──────────────────────────
    location / {
        limit_req zone=frontend burst=50 nodelay;

        proxy_pass         http://frontend_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host      $host;
        proxy_set_header   X-Real-IP $remote_addr;

        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }

    # ── Block scanners & probes ───────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.(php|asp|aspx|jsp|cgi|env|git|svn)$ {
        deny all;
        access_log off;
        log_not_found off;
        return 444;
    }
}

