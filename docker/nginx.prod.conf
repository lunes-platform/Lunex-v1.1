# =============================================================================
# 3. TESTNET NODE — sandbox.lunes.io (Blockchain RPC Proxy)
# =============================================================================

# HTTP → HTTPS Redirect
server {
    listen 80;
    server_name sandbox.lunes.io;

    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS (Testnet RPC)
server {
    listen 443 ssl http2;
    server_name sandbox.lunes.io;

    ssl_certificate     /etc/letsencrypt/live/sandbox.lunes.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sandbox.lunes.io/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL_TESTNET:5m;
    ssl_session_tickets off;

    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/sandbox.lunes.io/chain.pem;
    resolver 1.1.1.1 8.8.8.8 valid=60s;
    resolver_timeout 2s;

    # ── Security Headers (RPC-specific) ───────────────────────────────────────
    add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options       "nosniff" always;
    add_header X-Robots-Tag                "noindex, nofollow" always;
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    # ── Connection limits ─────────────────────────────────────────────────────
    limit_conn conn_limit 10;

    client_body_timeout   10s;
    client_header_timeout 10s;
    keepalive_timeout     65s;
    send_timeout          10s;

    client_max_body_size    256k;

    # ── Faucet endpoint (token distribution for community) ─────────────────
    location /faucet {
        limit_req zone=api_auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://faucet_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # ── RPC HTTP endpoint ─────────────────────────────────────────────────────
    location / {
        limit_req zone=rpc_limit burst=50 nodelay;
        limit_req_status 429;

        # CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
            add_header Access-Control-Max-Age       3600;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass         http://testnet_rpc;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # ── RPC WebSocket endpoint ────────────────────────────────────────────────
    location /ws {
        limit_conn conn_limit 5;

        proxy_pass         http://testnet_rpc;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Block everything else ─────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# =============================================================================
# 4. LEGACY REDIRECT — app.lunes.io → lunex.lunes.io
# =============================================================================
server {
    listen 80;
    listen 443 ssl http2;
    server_name app.lunes.io;

    # Use the production SSL cert (if available) or skip SSL for pure redirect
    ssl_certificate     /etc/letsencrypt/live/lunex.lunes.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lunex.lunes.io/privkey.pem;

    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    location / {
        return 301 https://lunex.lunes.io$request_uri;
    }
}

# =============================================================================
# 5. CATCH-ALL — Block requests to unknown hosts
# =============================================================================
server {
    listen 80 default_server;
    listen 443 ssl http2 default_server;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/lunex.lunes.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lunex.lunes.io/privkey.pem;

    return 444;
}
