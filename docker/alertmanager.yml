global:
  resolve_timeout: 5m
  smtp_from: 'lunex-alerts@lunes.io'
  smtp_smarthost: '${SMTP_HOST:-smtp.gmail.com}:587'
  smtp_auth_username: '${SMTP_USER}'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true

# ── Notification Templates ────────────────────────────────────────────────────
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# ── Routing ───────────────────────────────────────────────────────────────────
route:
  group_by: ['alertname', 'environment', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'ops-team'

  routes:
    # Critical: immediate page
    - match:
        severity: critical
      receiver: 'critical-pager'
      repeat_interval: 30m

    # Security: immediate
    - match:
        category: security
      receiver: 'security-team'
      repeat_interval: 1h

    # Smart contract / blockchain events
    - match:
        category: blockchain
      receiver: 'ops-team'
      repeat_interval: 2h

    # Silence DB backup failures on weekends (example)
    - match:
        alertname: DatabaseBackupFailed
      receiver: 'ops-team'
      repeat_interval: 24h

# ── Inhibition ───────────────────────────────────────────────────────────────
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'environment']

# ── Receivers ─────────────────────────────────────────────────────────────────
receivers:
  - name: 'ops-team'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_OPS}'
        channel: '#lunex-alerts'
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: '{{ if eq .Status "firing" }}{{ if eq (index .Alerts 0).Labels.severity "critical" }}danger{{ else }}warning{{ end }}{{ else }}good{{ end }}'
    email_configs:
      - to: '${ALERT_EMAIL_OPS}'
        send_resolved: true

  - name: 'critical-pager'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_CRITICAL}'
        channel: '#lunex-oncall'
        send_resolved: true
        title: '🚨 CRITICAL: {{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: 'danger'
    pagerduty_configs:
      - routing_key: '${PAGERDUTY_ROUTING_KEY}'
        send_resolved: true

  - name: 'security-team'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_SECURITY}'
        channel: '#lunex-security'
        send_resolved: true
        title: '🔐 Security Alert: {{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: 'danger'
