# ─────────────────────────────────────────────────────────────────
#  Lunex — Stack completa (staging / produção-like)
#
#  Serviços:
#    postgres   → banco de dados          porta host: 5433
#    api        → spot-api (REST + WS)    portas host: 4000 / 4001
#    frontend   → lunes-dex-main (React)  porta host: 3000
#    admin      → lunex-admin (Next.js)   porta host: 3001
#    nginx      → reverse proxy           porta host: 8080
#
#  Nota: o nó da Lunes roda em Docker separado (lunes-nightly).
#        Configure LUNES_WS_URL em docker/.env.docker para apontar
#        para ele (ex: ws://host.docker.internal:9944).
#
#  Uso:
#    docker compose -f docker-compose.dev.yml up --build
#    docker compose -f docker-compose.dev.yml up --build -d   # background
#    docker compose -f docker-compose.dev.yml down            # para
#    docker compose -f docker-compose.dev.yml down -v         # para + apaga DB
# ─────────────────────────────────────────────────────────────────

x-common-env: &common-env
  TZ: UTC

services:

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      <<: *common-env
      POSTGRES_DB: lunex_spot
      POSTGRES_USER: lunex
      POSTGRES_PASSWORD: lunex_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # 5433 no host para não colidir com postgres nativo local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lunex -d lunex_spot"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Spot API ──────────────────────────────────────────────────
  api:
    build:
      context: ./spot-api
      dockerfile: ../docker/Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./docker/.env.docker
    environment:
      <<: *common-env
      DATABASE_URL: postgresql://lunex:lunex_dev@postgres:5432/lunex_spot?schema=public
    ports:
      - "4000:4000"
      - "4001:4001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  # ── Frontend DEX ──────────────────────────────────────────────
  frontend:
    build:
      context: ./lunes-dex-main
      dockerfile: ../docker/Dockerfile.frontend
      args:
        REACT_APP_NETWORK: testnet
        REACT_APP_SPOT_API_URL: ""      # vazio → usa /api relativo via nginx
        REACT_APP_RPC_TESTNET: ${LUNES_WS_URL:-ws://localhost:9944}
        REACT_APP_FACTORY_CONTRACT: ${REACT_APP_FACTORY_CONTRACT:-}
        REACT_APP_ROUTER_CONTRACT: ${REACT_APP_ROUTER_CONTRACT:-}
        REACT_APP_STAKING_CONTRACT: ${REACT_APP_STAKING_CONTRACT:-}
        REACT_APP_REWARDS_CONTRACT: ${REACT_APP_REWARDS_CONTRACT:-}
        REACT_APP_TOKEN_WLUNES: ${WLUNES_ADDRESS:-}
        REACT_APP_TOKEN_LUSDT: ${LUSDT_ADDRESS:-}
        REACT_APP_TOKEN_LBTC: ${LBTC_ADDRESS:-}
        REACT_APP_TOKEN_LETH: ${LETH_ADDRESS:-}
        REACT_APP_TOKEN_GMC: ${GMC_ADDRESS:-}
        REACT_APP_TOKEN_LUP: ${LUP_ADDRESS:-}
        REACT_APP_ENABLE_STAKING: "true"
        REACT_APP_ENABLE_REWARDS: "true"
        REACT_APP_DEV_MODE: "false"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:80"
      
  # ── Admin (Next.js) ───────────────────────────────────────────
  admin:
    build:
      context: ./lunex-admin
      dockerfile: ../docker/Dockerfile.admin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      <<: *common-env
      DATABASE_URL: postgresql://lunex:lunex_dev@postgres:5432/lunex_spot?schema=public
      NEXTAUTH_URL: http://localhost:8080/admin
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      NEXT_PUBLIC_API_URL: http://api:4000
      PORT: "3001"
    ports:
      - "3001:3001"
      # Admin available at http://localhost:3001 and via nginx at http://localhost:8080/admin
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── SubQuery Node (blockchain indexer) ────────────────────────
  subquery-node:
    image: subquerynetwork/subql-node-substrate:v6.4.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./docker/.env.docker
    environment:
      <<: *common-env
      DB_USER: lunex
      DB_PASS: lunex_dev
      DB_DATABASE: lunex_spot       # same DB, --db-schema=subquery isolates tables
      DB_HOST: postgres
      DB_PORT: "5432"
      LUNES_WS_URL: ws://host.docker.internal:9944
      START_BLOCK: "1"
    volumes:
      - ./subquery-node:/app
    command:
      - -f=/app
      - --db-schema=subquery
      - --workers=2
      - --batch-size=50
      - --unfinalized-blocks=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    ports:
      - "3010:3000"

  # ── SubQuery Query (GraphQL API over indexed data) ─────────────
  subquery-query:
    image: subquerynetwork/subql-query:v2.13.1
    restart: unless-stopped
    depends_on:
      subquery-node:
        condition: service_healthy
    environment:
      <<: *common-env
      DB_USER: lunex
      DB_PASS: lunex_dev
      DB_DATABASE: lunex_subquery
      DB_HOST: postgres
      DB_PORT: "5432"
      PORT: "3000"
    command:
      - --name=lunex-subquery
      - --playground
      - --indexer=http://subquery-node:3000
    ports:
      - "3011:3000"
    # GraphQL Playground: http://localhost:3011

  # ── Nginx (reverse proxy unificado) ───────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      - api
      - frontend
      - admin
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
