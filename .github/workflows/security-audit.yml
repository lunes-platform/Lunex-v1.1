name: Security Audit

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  audit-frontend:
    name: Audit Frontend Dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lunes-dex-main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: NPM Audit (Critical)
        run: npm audit --audit-level=critical

  audit-backend:
    name: Audit Backend Dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spot-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: NPM Audit (Critical)
        run: npm audit --audit-level=critical

  build-check:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [audit-frontend, audit-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build Backend
        working-directory: spot-api
        run: |
          npm install
          npm run build
