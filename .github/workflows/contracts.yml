name: Lunex Contracts CI

on:
  push:
    paths:
      - "Lunex/contracts/**"
      - "contracts/**"
      - "fuzz/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    paths:
      - "Lunex/contracts/**"
      - "contracts/**"
      - "fuzz/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

concurrency:
  group: contracts-${{ github.ref }}
  cancel-in-progress: true

jobs:
# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Rust unit tests (all contracts)
# ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Contract Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rust-src, clippy, rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Rustfmt check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --exclude fuzz -- -D warnings

      - name: Run tests (workspace, exclude fuzz)
        run: cargo test --workspace --exclude fuzz

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — ink! contract compilation matrix
# ─────────────────────────────────────────────────────────────────────────────
  compile:
    name: Compile — ${{ matrix.contract }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - contract: router
            dir: Lunex/contracts/router
          - contract: pair
            dir: Lunex/contracts/pair
          - contract: factory
            dir: Lunex/contracts/factory
          - contract: copy_vault
            dir: Lunex/contracts/copy_vault
          - contract: staking
            dir: Lunex/contracts/staking
          - contract: spot_settlement
            dir: Lunex/contracts/spot_settlement
          - contract: asymmetric_pair
            dir: Lunex/contracts/asymmetric_pair
          - contract: psp22
            dir: Lunex/contracts/psp22
          - contract: rewards
            dir: Lunex/contracts/rewards
          - contract: wnative
            dir: Lunex/contracts/wnative
          - contract: listing_manager
            dir: contracts/listing_manager
          - contract: liquidity_lock
            dir: contracts/liquidity_lock

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rust-src

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.dir }}

      - name: Install cargo-contract
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-contract
          version: "^4"
          locked: true

      - name: Build — ${{ matrix.contract }}
        run: cargo contract build --release
        working-directory: ${{ matrix.dir }}

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: contract-${{ matrix.contract }}
          path: ${{ matrix.dir }}/target/ink/
          retention-days: 30

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Security: check for known Rust vulnerabilities
# ─────────────────────────────────────────────────────────────────────────────
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-audit
          version: "^0.20"

      - name: Run audit
        run: cargo audit --ignore RUSTSEC-2021-0145
