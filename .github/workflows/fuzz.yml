name: Fuzz Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'Lunex/contracts/**'
      - 'contracts/**'
      - 'fuzz/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'Lunex/contracts/**'
      - 'contracts/**'
      - 'fuzz/**'
  schedule:
    # Run nightly at 02:00 UTC so regressions are caught before business hours
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: 'Seconds to run each fuzz target'
        required: false
        default: '60'

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: Fuzz smart contracts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        target:
          - pair_invariant
          - copy_vault_accounting
          - spot_settlement_replay

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly (required by cargo-fuzz)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Cache Rust build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuzz/target
          key: fuzz-${{ matrix.target }}-${{ hashFiles('fuzz/Cargo.toml', 'Cargo.toml') }}
          restore-keys: fuzz-${{ matrix.target }}-

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run fuzz target — ${{ matrix.target }}
        working-directory: fuzz
        run: |
          DURATION=${{ github.event.inputs.fuzz_duration || '60' }}
          cargo fuzz run ${{ matrix.target }} -- \
            -max_total_time=${DURATION} \
            -print_final_stats=1 \
            -detect_leaks=0

      - name: Upload crash artefacts if any
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-crash-${{ matrix.target }}-${{ github.run_id }}
          path: fuzz/artifacts/${{ matrix.target }}/
          retention-days: 30

  property-tests:
    name: Property & invariant tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: property-tests-${{ hashFiles('Cargo.toml') }}
          restore-keys: property-tests-

      - name: Run property & invariant tests
        run: |
          cargo test --test property_security_invariants -- --test-threads=4
          cargo test --test integration_e2e -- --test-threads=1
          cargo test --test security_tests -- --test-threads=4
