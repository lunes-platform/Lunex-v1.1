name: PR Checks

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
# ─────────────────────────────────────────────────────────────────────────────
# Detect which modules changed — skip unnecessary jobs
# ─────────────────────────────────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      spot_api:    ${{ steps.filter.outputs.spot_api }}
      frontend:    ${{ steps.filter.outputs.frontend }}
      sdk:         ${{ steps.filter.outputs.sdk }}
      mcp:         ${{ steps.filter.outputs.mcp }}
      subquery:    ${{ steps.filter.outputs.subquery }}
      contracts:   ${{ steps.filter.outputs.contracts }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            spot_api:
              - 'spot-api/**'
            frontend:
              - 'lunes-dex-main/**'
            sdk:
              - 'sdk/**'
            mcp:
              - 'mcp/**'
            subquery:
              - 'subquery-node/**'
            contracts:
              - 'Lunex/contracts/**'
              - 'contracts/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

# ─────────────────────────────────────────────────────────────────────────────
# Fast type-check on changed modules only
# ─────────────────────────────────────────────────────────────────────────────
  typecheck-api:
    name: Typecheck spot-api
    needs: changes
    if: needs.changes.outputs.spot_api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: spot-api
      - run: npx tsc --noEmit
        working-directory: spot-api

  typecheck-frontend:
    name: Typecheck frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: lunes-dex-main
      - run: npx tsc --noEmit
        working-directory: lunes-dex-main

  typecheck-sdk:
    name: Typecheck SDK
    needs: changes
    if: needs.changes.outputs.sdk == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: sdk
      - run: npx tsc --noEmit
        working-directory: sdk

  typecheck-mcp:
    name: Typecheck MCP
    needs: changes
    if: needs.changes.outputs.mcp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: mcp/lunex-agent-mcp
      - run: npx tsc --noEmit
        working-directory: mcp/lunex-agent-mcp

  validate-subquery:
    name: Validate SubQuery
    needs: changes
    if: needs.changes.outputs.subquery == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: subquery-node
      - run: npx subql codegen
        working-directory: subquery-node
      - run: npx subql build
        working-directory: subquery-node

  check-contracts:
    name: Check Contracts (no build)
    needs: changes
    if: needs.changes.outputs.contracts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rust-src, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo check + clippy
        run: cargo clippy --workspace --exclude fuzz -- -D warnings

# ─────────────────────────────────────────────────────────────────────────────
# Required gate — all applicable checks must pass before merge
# ─────────────────────────────────────────────────────────────────────────────
  pr-gate:
    name: PR Gate
    runs-on: ubuntu-latest
    needs:
      - changes
      - typecheck-api
      - typecheck-frontend
      - typecheck-sdk
      - typecheck-mcp
      - validate-subquery
      - check-contracts
    if: always()
    steps:
      - name: Evaluate gate
        run: |
          RESULTS=(
            "${{ needs.typecheck-api.result }}"
            "${{ needs.typecheck-frontend.result }}"
            "${{ needs.typecheck-sdk.result }}"
            "${{ needs.typecheck-mcp.result }}"
            "${{ needs.validate-subquery.result }}"
            "${{ needs.check-contracts.result }}"
          )
          for r in "${RESULTS[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "Gate failed — one or more checks did not pass: $r"
              exit 1
            fi
          done
          echo "All applicable PR checks passed."
