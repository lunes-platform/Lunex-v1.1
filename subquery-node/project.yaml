specVersion: "1.0.0"
name: lunex-subquery
version: "1.0.0"
runner:
  node:
    name: "@subql/node"
    version: ">=3.0.0"
  query:
    name: "@subql/query"
    version: ">=2.0.0"

description: "Lunex DEX SubQuery indexer"
repository: "https://github.com/lunes-platform/lunex"

schema:
  file: ./schema.graphql

network:
  # DEV ONLY — replaced at startup by entrypoint.sh
  chainId: "0x7a556a1ed90087b4dfad63d019ced4b9aa7c49ff0a39c403c14490f9b5b5ad0e"
  endpoint:
    - "ws://host.docker.internal:9944"

